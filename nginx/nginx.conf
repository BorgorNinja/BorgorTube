# BorgorTube – Nginx reverse proxy configuration
# Handles: static frontend, API proxying, HLS segments, WebSocket bridge,
#          SSE streams, gzip, security headers

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml
        text/xml application/xhtml+xml;

    # ── Upstream definitions ──────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream deno_bridge {
        server deno:8001;
    }

    # ── Rate limiting zones ───────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=search_limit:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Main server block ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Frontend static files (cache-first) ──────────────────────────
        location /static/ {
            alias /srv/static/;
            expires 1d;
            add_header Cache-Control "public, immutable";
            try_files $uri $uri/ /srv/static/index.html;
        }

        # Root redirect to app
        location = / {
            return 302 /static/index.html;
        }

        # Service worker must be served from root scope
        location = /sw.js {
            alias /srv/static/sw.js;
            add_header Cache-Control "no-cache";
        }

        location = /manifest.json {
            alias /srv/static/manifest.json;
            add_header Cache-Control "public, max-age=86400";
        }

        # ── HLS segments (live, no cache) ─────────────────────────────────
        location /hls/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            # HLS playlists must not be cached
            add_header Cache-Control "no-cache, no-store" always;
            add_header Access-Control-Allow-Origin "*" always;
            # Large segments
            proxy_buffering off;
        }

        # ── SSE endpoints (download progress) ─────────────────────────────
        location ~ ^/api/download/progress/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            add_header X-Accel-Buffering "no";
        }

        # ── Search API (rate limited) ──────────────────────────────────────
        location /api/search {
            limit_req zone=search_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # ── General API ────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            limit_conn conn_limit 10;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
        }

        # ── WebSocket API (mpv relay) ──────────────────────────────────────
        location /ws/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ── Deno MPV bridge WebSocket ──────────────────────────────────────
        location /mpv-bridge {
            proxy_pass http://deno_bridge;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ── Health check ───────────────────────────────────────────────────
        location /health {
            proxy_pass http://api_backend;
            access_log off;
        }

        # ── Downloads ──────────────────────────────────────────────────────
        location /downloads/ {
            # Serve completed download files directly
            # Mount borgortube_data:/data and alias here
            alias /data/downloads/;
            add_header Content-Disposition "attachment";
        }
    }

    # ── HTTPS server (uncomment and add certs to nginx/ssl/) ──────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     include             /etc/nginx/ssl/options-ssl-nginx.conf;
    #     # ... same location blocks as above ...
    # }
}
